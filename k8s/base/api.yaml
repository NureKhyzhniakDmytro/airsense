apiVersion: v1
kind: Service
metadata:
  name: airsense-api
spec:
  selector:
    app: airsense-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airsense-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airsense-api
  template:
    metadata:
      labels:
        app: airsense-api
    spec:
      containers:
        - name: airsense-api
          image: airsense-api:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: airsense-secret
                  key: postgres-connection-string
            - name: Mqtt__ConnectionUri
              value: mqtt://emqx:1883
            - name: Mqtt__ApiPassword
              valueFrom:
                secretKeyRef:
                  name: airsense-secret
                  key: mqtt-api-password
            - name: Firebase__ProjectName
              valueFrom:
                secretKeyRef:
                  name: airsense-secret
                  key: firebase-project-name
            - name: Firebase__CredentialsFileLocation
              valueFrom:
                secretKeyRef:
                  name: airsense-secret
                  key: firebase-credentials-file-location
            - name: Airsense__ServiceRole
              value: api
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 30
            periodSeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
