apiVersion: batch/v1
kind: Job
metadata:
  name: airsense-db-migration
  labels:
    {{- include "airsense.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-migration
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: airsense-db-migration
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: db-migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-migration
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: postgres-database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: postgres-password
          command:
            - sh
            - -ec
            - |
              until pg_isready -h postgres -p {{ .Values.postgres.service.port }} -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                sleep 2
              done
              PGPASSWORD="$POSTGRES_PASSWORD" psql \
                -h postgres \
                -p {{ .Values.postgres.service.port }} \
                -U "$POSTGRES_USER" \
                -d "$POSTGRES_DB" \
                -v ON_ERROR_STOP=1 \
                -f /migrations/04-upgrades.sql
          volumeMounts:
            - name: postgres-initdb
              mountPath: /migrations
              readOnly: true
      volumes:
        - name: postgres-initdb
          configMap:
            name: postgres-initdb
