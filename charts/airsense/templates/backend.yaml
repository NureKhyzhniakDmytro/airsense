{{- range .Values.backend.roles }}
{{- if .service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  labels:
    {{- include "airsense.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ .name }}
spec:
  selector:
    app: {{ .name }}
  ports:
    - name: http
      port: {{ .service.port }}
      targetPort: {{ $.Values.backend.port }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  labels:
    {{- include "airsense.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ .name }}
spec:
  replicas: {{ $.Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        app: {{ .name }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: {{ .name }}
    spec:
      containers:
        - name: {{ .name }}
          image: {{ include "airsense.backendImage" $ | quote }}
          imagePullPolicy: {{ $.Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ $.Values.backend.port }}
          env:
            - name: ASPNETCORE_URLS
              value: {{ $.Values.backend.aspnetcoreUrls | quote }}
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secret.name }}
                  key: postgres-connection-string
            - name: Mqtt__ConnectionUri
              value: {{ $.Values.backend.mqttConnectionUri | quote }}
            - name: Mqtt__ApiPassword
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secret.name }}
                  key: mqtt-api-password
            - name: Ai__PredictionServiceUrl
              value: {{ $.Values.backend.aiPredictionServiceUrl | quote }}
            - name: Firebase__ProjectName
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secret.name }}
                  key: firebase-project-name
            - name: Firebase__CredentialsFileLocation
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secret.name }}
                  key: firebase-credentials-file-location
            - name: Airsense__ServiceRole
              value: {{ .serviceRole | quote }}
          startupProbe:
            httpGet:
              path: /healthz
              port: {{ $.Values.backend.port }}
            failureThreshold: {{ $.Values.backend.startupProbe.failureThreshold }}
            periodSeconds: {{ $.Values.backend.startupProbe.periodSeconds }}
{{- if $.Values.secret.firebaseCredentialsJson }}
          volumeMounts:
            - name: firebase-service-account
              mountPath: /var/run/secrets/airsense
              readOnly: true
{{- end }}
          resources:
            {{- toYaml $.Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ $.Values.backend.port }}
            initialDelaySeconds: {{ $.Values.backend.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ $.Values.backend.readinessProbe.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ $.Values.backend.port }}
            initialDelaySeconds: {{ $.Values.backend.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ $.Values.backend.livenessProbe.periodSeconds }}
{{- if $.Values.secret.firebaseCredentialsJson }}
      volumes:
        - name: firebase-service-account
          secret:
            secretName: {{ $.Values.secret.name }}
            items:
              - key: firebase-service-account.json
                path: firebase-service-account.json
{{- end }}
---
{{- end }}
