replicaCount: 1

secret:
  name: airsense-secret
  postgresUser: postgres
  postgresPassword: airsense1234
  postgresDatabase: airsensedb
  postgresConnectionString: ""
  mqttApiPassword: airsense-api-secret
  firebaseProjectName: ""
  firebaseCredentialsFileLocation: ""

backend:
  image:
    repository: airsense-api
    tag: local
    pullPolicy: Never
  port: 8080
  aspnetcoreUrls: http://+:8080
  mqttConnectionUri: mqtt://emqx:1883
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  startupProbe:
    failureThreshold: 30
    periodSeconds: 2
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 20
    periodSeconds: 20
  roles:
    - name: airsense-api
      serviceRole: api
      service:
        enabled: true
        port: 8080
    - name: telemetry-ingestion
      serviceRole: telemetry-ingestion
      service:
        enabled: false
    - name: automation
      serviceRole: automation
      service:
        enabled: false
    - name: notification
      serviceRole: notification
      service:
        enabled: false

postgres:
  image:
    repository: postgres
    tag: "15"
    pullPolicy: IfNotPresent
  service:
    port: 5432
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 768Mi
  startupProbe:
    failureThreshold: 60
    periodSeconds: 2
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 20

redis:
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  service:
    port: 6379
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  startupProbe:
    failureThreshold: 30
    periodSeconds: 2
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 20
    periodSeconds: 20

emqx:
  image:
    repository: emqx/emqx
    tag: latest
    pullPolicy: IfNotPresent
  service:
    mqttPort: 1883
    dashboardPort: 18083
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 768Mi
  startupProbe:
    failureThreshold: 60
    periodSeconds: 2
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 20
