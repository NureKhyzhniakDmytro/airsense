replicaCount: 1

secret:
  name: airsense-secret
  postgresUser: postgres
  postgresPassword: airsense1234
  postgresDatabase: airsensedb
  postgresConnectionString: ""
  mqttApiPassword: airsense-api-secret
  firebaseProjectName: ""
  firebaseCredentialsFileLocation: ""
  firebaseCredentialsJson: ""

backend:
  image:
    repository: airsense-api
    tag: local
    pullPolicy: Never
  port: 8080
  aspnetcoreUrls: http://+:8080
  mqttConnectionUri: mqtt://emqx:1883
  aiPredictionServiceUrl: http://ai-prediction-service:8000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  startupProbe:
    failureThreshold: 30
    periodSeconds: 2
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 20
    periodSeconds: 20
  roles:
    - name: airsense-api
      serviceRole: api
      service:
        enabled: true
        port: 8080
    - name: telemetry-ingestion
      serviceRole: telemetry-ingestion
      service:
        enabled: false
    - name: automation
      serviceRole: automation
      service:
        enabled: false
    - name: notification
      serviceRole: notification
      service:
        enabled: false

postgres:
  image:
    repository: postgres
    tag: "15"
    pullPolicy: IfNotPresent
  service:
    port: 5432
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 768Mi
  startupProbe:
    failureThreshold: 60
    periodSeconds: 2
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 20

redis:
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  service:
    port: 6379
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  startupProbe:
    failureThreshold: 30
    periodSeconds: 2
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 20
    periodSeconds: 20

emqx:
  image:
    repository: emqx/emqx
    tag: latest
    pullPolicy: IfNotPresent
  service:
    mqttPort: 1883
    dashboardPort: 18083
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 768Mi
  startupProbe:
    failureThreshold: 60
    periodSeconds: 2
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 20


frontend:
  enabled: true
  name: airsense-web
  replicaCount: 1
  image:
    repository: airsense-web
    tag: local
    pullPolicy: Never
  port: 3000
  service:
    port: 3000
  apiInternalBaseUrl: http://airsense-api:8080
  publicApiBaseUrl: /api
  firebase:
    apiKey: ""
    authDomain: ""
    projectId: ""
    storageBucket: ""
    messagingSenderId: ""
    appId: ""
    measurementId: ""
    vapidKey: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  startupProbe:
    failureThreshold: 30
    periodSeconds: 2
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 20
    periodSeconds: 20
  ingress:
    enabled: true
    className: nginx
    host: ""
    annotations: {}
    tls: []

aiPrediction:
  enabled: true
  name: ai-prediction-service
  image:
    repository: airsense-ai-prediction
    tag: local
    pullPolicy: Never
  port: 8000
  service:
    port: 8000
  modelPath: /models/model.joblib
  modelStorage:
    enabled: true
    size: 1Gi
    storageClassName: ""
    mountPath: /models
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1024Mi
  startupProbe:
    failureThreshold: 30
    periodSeconds: 2
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 20
    periodSeconds: 20
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

aiTraining:
  enabled: true
  schedule: "*/30 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2

deviceTelemetrySimulator:
  enabled: true
  name: device-telemetry-simulator
  image:
    repository: airsense-device-telemetry-simulator
    tag: local
    pullPolicy: Never
  roomCount: "4"
  demoEnvironmentName: "AirSense Demo Environment"
  demoOwnerEmail: "khijnyak.dima@gmail.com"
  demoRoomPrefix: "Demo Room"
  publishIntervalSeconds: "10"
  scenarioRotationSeconds: "300"
  mqttUsername: api
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 500m
      memory: 256Mi
